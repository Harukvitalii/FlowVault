appId: com.withdrawhelper.app
productName: Withdraw Helper
copyright: Copyright © 2026

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json
  - '!**/.DS_Store'
  - '!**/*.map'
  - '!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}'
  - '!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}'

asar: true
compression: normal
removePackageScripts: true

# Electron-vite emits to out/ — we include it above, and node_modules
# is bundled automatically from package.json dependencies.
npmRebuild: false

mac:
  category: public.app-category.finance
  hardenedRuntime: true
  gatekeeperAssess: false
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  # No signing by default — SmartScreen will warn until you supply a cert.

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  deleteAppDataOnUninstall: false
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Withdraw Helper

linux:
  category: Finance
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

publish: null
